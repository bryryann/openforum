<header>
  <div class="header-title">
    <h2 [routerLink]="['/welcome']">
      OpenForum
    </h2>
    <p>The forum for programmers.</p>
  </div>

  <div class="buttons">
    <a
      [routerLink]="['/auth']"
      [queryParams]="{view: 'login'}"
      class="account-link"
    >
      Log In
    </a>
    or
    <a
      [routerLink]="['/auth']"
      [queryParams]="{view: 'register'}"
      class="account-link"
    >
      Create Account
    </a>
  </div>
</header>
