@if (view() === 'login' || view() === undefined) {
  <app-login />
  <div>
    Not registered yet?
    <button class="toggle-view" (click)="toggleView()" >Create an account!</button>
  </div>
} @else if(view() === 'register') {
  <app-signup />
  <div>
    Already have an account?
    <button class="toggle-view" (click)="toggleView()" >Log In!</button>
  </div>
}
